name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gofmt:
    name: Go format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not formatted with gofmt:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

  go-mod-tidy:
    name: Go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod

      - name: Check go.mod and go.sum are tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum are not tidy. Run 'go mod tidy' and commit the changes."
            exit 1
          fi

  gazelle:
    name: Gazelle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-gazelle
          repository-cache: true

      - name: Check BUILD files are up-to-date
        run: |
          DIFF=$(bazel run //:gazelle -- update -mode diff 2>/dev/null)
          if [ -n "$DIFF" ]; then
            echo "::error::BUILD files are out of date. Run 'bazel run //:gazelle' to regenerate."
            echo "$DIFF"
            exit 1
          fi
