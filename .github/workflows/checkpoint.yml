name: Checkpoint

on:
  push:
    branches: [main]

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: project-oak/git-ratchet/actions/checkpoint@main
        with:
          ref: refs/heads/main
          origin-key: ${{ secrets.ORIGIN_KEY }}
          policy: ratchet-checkpoint.policy
          github-token: ${{ secrets.WITNESS_GITHUB_TOKEN }}
