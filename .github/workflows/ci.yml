name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run all tests
        run: bazel test //...

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Running 'bazel test //...' modified tracked files. Please commit the changes (e.g. MODULE.bazel.lock)."
            exit 1
          fi
