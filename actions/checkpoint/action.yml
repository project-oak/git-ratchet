name: 'git-ratchet checkpoint'
description: >
  Origin-side checkpoint lifecycle: create a checkpoint request, submit it
  to all witnesses (HTTP and GitHub Issue), collect cosignatures, evaluate
  quorum, and store the result.

inputs:
  ref:
    description: 'Full ref path to checkpoint (e.g. refs/heads/main)'
    required: true
  origin-key:
    description: 'Origin Ed25519 private key file contents (vkey + seed)'
    required: true
  policy:
    description: 'Path to the witness policy file (relative to repo root)'
    required: true
  github-token:
    description: 'GitHub token with permission to create issues on witness repos'
    required: false
    default: ${{ github.token }}
  gitlab-token:
    description: 'GitLab token with permission to create/read issues on witness projects (api scope, Reporter role). One token covers all gitlab-issue:// witnesses on the same instance.'
    required: false
    default: ''
  version:
    description: 'git-ratchet version to install (e.g. "v0.1.0"). Defaults to latest.'
    required: false
    default: 'latest'
  timeout:
    description: 'Timeout in seconds for GitHub/GitLab Issue witness polling'
    required: false
    default: '300'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install git-ratchet
      uses: project-oak/git-ratchet/actions/setup@main
      with:
        tool: git-ratchet
        version: ${{ inputs.version }}

    - name: Fetch checkpoint refs
      shell: bash
      run: git fetch origin 'refs/checkpoints/*:refs/checkpoints/*' 2>/dev/null || true

    - name: Create checkpoint request
      shell: bash
      env:
        ORIGIN_KEY: ${{ inputs.origin-key }}
      run: |
        # Write origin key to a temporary file.
        KEYFILE="${RUNNER_TEMP}/origin.vkey"
        printf '%s\n' "$ORIGIN_KEY" > "$KEYFILE"
        chmod 600 "$KEYFILE"

        git-ratchet checkpoint-request \
          --ref "${{ inputs.ref }}" \
          --key "$KEYFILE" \
          --output-request "${RUNNER_TEMP}/request.txt" \
          --output-note "${RUNNER_TEMP}/note.txt"

        rm -f "$KEYFILE"

    - name: Submit to witnesses and collect cosignatures
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GITLAB_TOKEN: ${{ inputs.gitlab-token }}
        TIMEOUT: ${{ inputs.timeout }}
      run: |
        COSIG_DIR="${RUNNER_TEMP}/cosigs"
        mkdir -p "$COSIG_DIR"
        COSIG_COUNT=0

        # Parse witness lines from the policy file.
        # Format: witness <name> <url> <vkey>
        while IFS=' ' read -r _ NAME URL _VKEY; do
          SCHEME="${URL%%://*}"

          case "$SCHEME" in
            https|http)
              echo "Submitting to HTTP witness ${NAME} at ${URL}..."
              HTTP_CODE=$(curl -s -o "${COSIG_DIR}/cosig-${NAME}.txt" \
                -w '%{http_code}' \
                -X POST \
                --data-binary @"${RUNNER_TEMP}/request.txt" \
                "${URL}")
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "::notice::Received cosignature from HTTP witness ${NAME}"
                COSIG_COUNT=$((COSIG_COUNT + 1))
              else
                echo "::warning::HTTP witness ${NAME} returned status ${HTTP_CODE}"
                rm -f "${COSIG_DIR}/cosig-${NAME}.txt"
              fi
              ;;

            github-issue)
              # URL format: github-issue://owner/repo
              WITNESS_REPO="${URL#github-issue://}"
              echo "Submitting to GitHub Issue witness ${NAME} at ${WITNESS_REPO}..."

              # Extract origin and ref from the signed note for the issue title.
              NOTE_FIRST_LINE=$(sed -n '/^$/,$ p' "${RUNNER_TEMP}/request.txt" \
                | tail -n+2 | head -1)
              ORIGIN_NAME=$(echo "$NOTE_FIRST_LINE" | cut -d' ' -f1)
              REF_NAME=$(echo "$NOTE_FIRST_LINE" | cut -d' ' -f2)

              # Create the issue with the request body in an add-checkpoint fence.
              ISSUE_BODY=$(printf '```add-checkpoint\n%s\n```' \
                "$(cat "${RUNNER_TEMP}/request.txt")")
              ISSUE_URL=$(gh issue create \
                --repo "$WITNESS_REPO" \
                --title "checkpoint: ${ORIGIN_NAME} ${REF_NAME}" \
                --body "$ISSUE_BODY")
              ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')

              echo "Created issue #${ISSUE_NUM} on ${WITNESS_REPO}. Polling..."

              # Poll for a cosignature comment (look for the em dash signature prefix).
              ELAPSED=0
              POLL_INTERVAL=5
              COSIG=""
              while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                sleep "$POLL_INTERVAL"
                ELAPSED=$((ELAPSED + POLL_INTERVAL))

                # Check if issue is closed (witness processed it).
                STATE=$(gh api "repos/${WITNESS_REPO}/issues/${ISSUE_NUM}" \
                  --jq '.state' 2>/dev/null || echo "open")

                if [ "$STATE" = "closed" ]; then
                  # Look for a cosignature in the comments.
                  COSIG=$(gh api "repos/${WITNESS_REPO}/issues/${ISSUE_NUM}/comments" \
                    --jq '.[].body' 2>/dev/null \
                    | grep -m1 '^— ' || true)
                  break
                fi
              done

              if [ -n "$COSIG" ]; then
                printf '%s' "$COSIG" > "${COSIG_DIR}/cosig-${NAME}.txt"
                echo "::notice::Received cosignature from GitHub Issue witness ${NAME}"
                COSIG_COUNT=$((COSIG_COUNT + 1))
              else
                echo "::warning::GitHub Issue witness ${NAME} did not respond within ${TIMEOUT}s"
              fi
              ;;

            gitlab-issue)
              # URL format: gitlab-issue://<host>/<project-path>
              WITNESS_PATH="${URL#gitlab-issue://}"
              GITLAB_HOST=$(echo "$WITNESS_PATH" | cut -d'/' -f1)
              GITLAB_PROJECT=$(echo "$WITNESS_PATH" | cut -d'/' -f2-)
              echo "Submitting to GitLab Issue witness ${NAME} at ${GITLAB_HOST}/${GITLAB_PROJECT}..."

              if [ -z "$GITLAB_TOKEN" ]; then
                echo "::error::gitlab-token input is required for gitlab-issue:// witnesses but was not set"
                exit 1
              fi

              # URL-encode the project path (/ → %2F) for GitLab API calls.
              GITLAB_PROJECT_ENCODED=$(printf '%s' "$GITLAB_PROJECT" | sed 's|/|%2F|g')
              GITLAB_API="https://${GITLAB_HOST}/api/v4"

              # Extract origin and ref from the signed note for the issue title.
              NOTE_FIRST_LINE=$(sed -n '/^$/,$ p' "${RUNNER_TEMP}/request.txt" \
                | tail -n+2 | head -1)
              ORIGIN_NAME=$(echo "$NOTE_FIRST_LINE" | cut -d' ' -f1)
              REF_NAME=$(echo "$NOTE_FIRST_LINE" | cut -d' ' -f2)

              # Create the issue with the request body in an add-checkpoint fence.
              ISSUE_TITLE="checkpoint: ${ORIGIN_NAME} ${REF_NAME}"
              ISSUE_DESC=$(printf '```add-checkpoint\n%s\n```' \
                "$(cat "${RUNNER_TEMP}/request.txt")")

              ISSUE_RESPONSE=$(curl -fsSL --request POST \
                --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                --data-urlencode "title=${ISSUE_TITLE}" \
                --data-urlencode "description=${ISSUE_DESC}" \
                "${GITLAB_API}/projects/${GITLAB_PROJECT_ENCODED}/issues")
              ISSUE_IID=$(echo "$ISSUE_RESPONSE" | jq -r '.iid')

              if [ -z "$ISSUE_IID" ] || [ "$ISSUE_IID" = "null" ]; then
                echo "::warning::Failed to create issue on GitLab project ${GITLAB_PROJECT}"
                continue
              fi

              echo "Created issue #${ISSUE_IID} on ${GITLAB_HOST}/${GITLAB_PROJECT}. Polling..."

              # Poll for issue closure.
              ELAPSED=0
              POLL_INTERVAL=5
              COSIG=""
              while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
                sleep "$POLL_INTERVAL"
                ELAPSED=$((ELAPSED + POLL_INTERVAL))

                STATE=$(curl -fsSL \
                  --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                  "${GITLAB_API}/projects/${GITLAB_PROJECT_ENCODED}/issues/${ISSUE_IID}" \
                  | jq -r '.state' 2>/dev/null || echo "opened")

                if [ "$STATE" = "closed" ]; then
                  # Read issue notes looking for the cosignature (line starting with "— ").
                  COSIG=$(curl -fsSL \
                    --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                    "${GITLAB_API}/projects/${GITLAB_PROJECT_ENCODED}/issues/${ISSUE_IID}/notes?per_page=100" \
                    | jq -r '.[].body' 2>/dev/null \
                    | grep -m1 '^— ' || true)
                  break
                fi
              done

              if [ -n "$COSIG" ]; then
                printf '%s' "$COSIG" > "${COSIG_DIR}/cosig-${NAME}.txt"
                echo "::notice::Received cosignature from GitLab Issue witness ${NAME}"
                COSIG_COUNT=$((COSIG_COUNT + 1))
              else
                echo "::warning::GitLab Issue witness ${NAME} did not respond within ${TIMEOUT}s"
              fi
              ;;

            *)
              echo "::warning::Unknown witness URL scheme '${SCHEME}' for ${NAME}, skipping"
              ;;
          esac
        done < <(grep '^witness ' "${{ inputs.policy }}")

        echo "Collected ${COSIG_COUNT} cosignature(s)"

    - name: Assemble and store checkpoint
      shell: bash
      run: |
        COSIG_DIR="${RUNNER_TEMP}/cosigs"

        # Build --cosig flags for each collected cosignature.
        COSIG_FLAGS=""
        for f in "${COSIG_DIR}"/cosig-*.txt; do
          [ -f "$f" ] || continue
          COSIG_FLAGS="${COSIG_FLAGS} --cosig ${f}"
        done

        git-ratchet checkpoint-store \
          --ref "${{ inputs.ref }}" \
          --policy "${{ inputs.policy }}" \
          --note "${RUNNER_TEMP}/note.txt" \
          $COSIG_FLAGS

    - name: Push checkpoint ref
      shell: bash
      run: |
        REF="${{ inputs.ref }}"
        # checkpoint-store writes to refs/checkpoints/heads/<branch>
        # or refs/checkpoints/tags/<tag>.
        CHECKPOINT_REF="refs/checkpoints/${REF#refs/}"
        git push --force origin "$CHECKPOINT_REF"
